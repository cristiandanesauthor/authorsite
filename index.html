<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cristian Danes Author</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        .menu {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 32px;
            background: rgba(0, 0, 0, 0.20);
            box-shadow: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            z-index: 20;
            backdrop-filter: blur(2px);
        }

        .brand {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            text-decoration: none;
            color: #fff;
            font-weight: 500;
            padding: 8px 12px;
            display: inline-block;
            min-width: 90px;
            text-align: center;
            white-space: nowrap;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.022);
        }

        .nav-item {
            position: relative;
        }

        .submenu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 10px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.12);
            white-space: nowrap;
            overflow: hidden;
            z-index: 30;
        }

        .submenu a {
            display: block;
            text-align: left;
            padding: 8px 10px;
        }

        .submenu a:hover {
            background: rgba(255, 255, 255, 0.189);
        }

        .nav-item.open .submenu {
            display: block;
        }

        .submenu-indicator {
            margin-left: 4px;
            font-size: 0.8rem;
            vertical-align: middle;
        }

        .banner {
            background-color: #1f3a5f;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #fff;
            padding: 100px 32px 60px;
            min-height: 280px;
            box-sizing: border-box;
            text-align: center;
            transition: background-image 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .banner::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .banner h1,
        .banner p {
            position: relative;
            z-index: 1;
        }

        .banner h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        .banner p {
            margin: 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        .content {
            padding: 40px 32px;
            max-width: 800px;
            margin: 0 auto;
        }

        .content-pane {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 32px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .nav-links a.active {
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <section class="banner">
        <nav class="menu">
            <div class="brand">Cristian Danes</div>
            <div class="nav-links">
                <a href="#" class="active" data-section="about">Home</a>
                <div class="nav-item" id="books-menu">
                    <a href="#" id="books-toggle" data-section="books">Books <span class="submenu-indicator">▾</span></a>
                    <div class="submenu">
                        <a href="#" data-section="physical-realm">The Physical Realm</a>
                        <a href="#" data-section="physical-realm">The Nihvars of Kehleis</a>
                        <a href="#" data-section="physical-realm">Memory's Thrall</a>
                    </div>
                </div>
                <a href="#" data-section="contact">Contact</a>
            </div>
        </nav>

        <h1>Welcome to my author site</h1>
        <p>Discover stories, ideas, and the worlds I create.</p>
    </section>

    <section id="content-pane" class="content content-pane"></section>

    <script>
        const contentData = {
            about: {
                title: 'About the Author',
                body: 'Cristian Danes writes with a deep focus on imagination, emotion, and the exploration of new realities.'
            },
            books: {
                title: 'Books',
                body: 'Explore the books and stories created by Cristian Danes.'
            },
            'physical-realm': {
                title: 'The Physical Realm',
                body: 'This is the featured book and the world it explores.'
            },
            contact: {
                title: 'Contact',
                body: 'Reach out for inquiries, events, or speaking opportunities.'
            }
        };

        const contentPane = document.getElementById('content-pane');
        const banner = document.querySelector('.banner');
        const navLinks = document.querySelectorAll('.nav-links a[data-section]');
        const booksMenu = document.getElementById('books-menu');
        const booksToggle = document.getElementById('books-toggle');
        const bannerImages = {
            about: 'banners/Banner1.jpg',
            books: 'banners/Banner2.jpg',
            'physical-realm': 'banners/Banner3.jpg',
            contact: 'banners/Banner4.jpg'
        };

        function renderSection(section) {
            const item = contentData[section] || contentData.about;
            contentPane.innerHTML = `<h2>${item.title}</h2><p>${item.body}</p>`;
            const image = bannerImages[section] || bannerImages.about;
            banner.style.backgroundImage = `url('${image}')`;
        }

        function closeSubmenu() {
            booksMenu.classList.remove('open');
        }

        booksToggle.addEventListener('click', function(event) {
            event.preventDefault();
            booksMenu.classList.toggle('open');
        });

        navLinks.forEach(function(link) {
            link.addEventListener('click', function(event) {
                event.preventDefault();
                const section = this.getAttribute('data-section');

                navLinks.forEach(function(item) {
                    item.classList.remove('active');
                });

                if (this !== booksToggle) {
                    closeSubmenu();
                }

                this.classList.add('active');
                renderSection(section);
            });
        });

        document.addEventListener('click', function(event) {
            if (!booksMenu.contains(event.target)) {
                closeSubmenu();
            }
        });

        renderSection('about');
    </script>
</body>
</html>
